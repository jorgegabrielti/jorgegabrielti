name: Latest Medium Articles

on:
  schedule:
    - cron: '0 6 * * *'  # Roda todo dia às 06:00 UTC
  workflow_dispatch:       # Permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Fetch and inject latest 5 Medium posts (sorted by date)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch and inject Medium posts
        run: |
          python3 - <<'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import re
          from email.utils import parsedate_to_datetime

          url = "https://medium.com/feed/@jorgegabriel.ti"
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          with urllib.request.urlopen(req) as response:
              xml_data = response.read()

          root = ET.fromstring(xml_data)
          items = root.findall('./channel/item')

          posts = []
          for item in items:
              title = item.find('title').text
              link = item.find('link').text
              pubDate = item.find('pubDate').text
              dt = parsedate_to_datetime(pubDate)
              posts.append({'title': title, 'link': link, 'date': dt})

          posts.sort(key=lambda x: x['date'], reverse=True)

          markdown_list = "<!-- BLOG-POST-LIST:START -->\n"
          for post in posts[:5]:
              markdown_list += f"- [{post['title']}]({post['link']})\n"
          markdown_list += "<!-- BLOG-POST-LIST:END -->"

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->",
              markdown_list,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_content)

          print("✅ README updated with the 5 most recent Medium posts.")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: auto-update Medium articles [skip ci]"
          git push
