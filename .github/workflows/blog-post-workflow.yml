name: Últimos Artigos do Medium
on:
  schedule:
    # Roda todo dia à meia noite
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite rodar manualmente na aba Actions do GitHub

permissions:
  contents: write # Para poder dar commit no README

jobs:
  update-readme-with-blog:
    name: Atualiza o README com os últimos artigos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull Latest Blog Posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@jorgegabriel.ti"
          max_post_count: 5
